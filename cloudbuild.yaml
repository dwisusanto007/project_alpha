steps:
  # Step 1 — Install dependencies
  - name: 'node:22'
    entrypoint: npm
    args: ['install']

  # Step 2 — Lint
  - name: 'node:22'
    entrypoint: npm
    args: ['run', 'lint']

  # Step 3 — Test with coverage
  - name: 'node:22'
    entrypoint: npm
    args: ['test', '--', '--coverage', '--coverageReporters=text-summary']
    env:
      - 'NODE_ENV=test'
      - 'DATABASE_URL=$$DATABASE_URL'
      - 'PORTAL_JWT_SECRET=$$PORTAL_JWT_SECRET'
    secretEnv:
      - 'DATABASE_URL'
      - 'PORTAL_JWT_SECRET'

  # Step 4 — Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --platform=linux/amd64
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/project-alpha/app:$COMMIT_SHA
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/project-alpha/app:latest
      - .

  # Step 5 — Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/$PROJECT_ID/project-alpha/app

  # Step 6 — Deploy to Cloud Run staging
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - project-alpha-staging
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/project-alpha/app:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/PORTAL_JWT_SECRET/versions/latest
      env: PORTAL_JWT_SECRET

options:
  logging: CLOUD_LOGGING_ONLY
